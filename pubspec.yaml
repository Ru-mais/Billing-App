name: billo
description: billo - Shared Real-time Billing
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Code Generation Annotations
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  
  # Scanner & Printer
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  bloc: ^8.1.4
  uuid: ^4.5.2
  app_settings: ^7.0.0
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  supabase_flutter: ^2.6.0
  archive: ^3.6.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # App Icon Generator
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
